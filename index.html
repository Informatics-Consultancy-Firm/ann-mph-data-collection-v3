<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IPTp-SP Survey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-50:#eef5ff; --blue-100:#dcebfd; --blue-200:#c2ddfb; --blue-300:#93c1f6;
    --blue-400:#5ea3f0; --blue-500:#2f7de1; --blue-600:#1c66c9; --blue-700:#124f9e;
    --ink:#12314f; --muted:#5b7591; --line:#dbe8f7; --white:#ffffff;
    --success:#1f9d6b; --success-bg:#e5f6ee; --danger:#d1495b; --warn:#e0a100;
    --shadow-sm:0 2px 8px rgba(24,74,143,.08);
    --shadow-md:0 10px 30px rgba(24,74,143,.14);
    --shadow-lg:0 26px 60px rgba(24,74,143,.22);
    --r:18px; --disp:'Oswald',system-ui,sans-serif; --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{font-family:var(--body);color:var(--ink);background:var(--white);display:flex;align-items:center;justify-content:center;padding:20px;}

  .phone{width:400px;max-width:100%;height:860px;max-height:96vh;background:#0a1c30;border-radius:46px;padding:12px;box-shadow:var(--shadow-lg);}
  .screen{position:relative;width:100%;height:100%;background:var(--white);border-radius:36px;overflow:hidden;}
  #app{position:absolute;inset:0;display:flex;flex-direction:column;}
  @media (max-width:520px){body{padding:0;}.phone{width:100%;height:100vh;max-height:none;border-radius:0;padding:0;}.screen{border-radius:0;}}

  .appbar{flex:0 0 auto;background:var(--blue-100);color:var(--blue-700);padding:16px 18px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--blue-200);}
  .appbar .ico-btn{width:38px;height:38px;border:none;border-radius:12px;background:var(--white);color:var(--blue-600);display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow-sm);flex:0 0 auto;}
  .appbar .ico-btn:active{transform:scale(.94);}
  .appbar .titles{min-width:0;flex:1;}
  .appbar .eyebrow{font:600 10px/1 var(--body);letter-spacing:.16em;text-transform:uppercase;color:var(--blue-500);opacity:.85;}
  .appbar .title{font:600 17px/1.15 var(--disp);letter-spacing:.02em;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .progress-wrap{flex:0 0 auto;background:var(--blue-100);padding:0 18px 12px;}
  .progress-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .progress-row .step{font:600 11px/1 var(--body);color:var(--blue-600);}
  .progress-row .pct{font:600 11px/1 var(--body);color:var(--blue-500);}
  .track{height:6px;background:var(--white);border-radius:99px;overflow:hidden;}
  .fill{height:100%;width:0;background:linear-gradient(90deg,var(--blue-400),var(--blue-600));border-radius:99px;transition:width .35s cubic-bezier(.4,0,.2,1);}

  .body{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .footer{flex:0 0 auto;background:var(--blue-100);border-top:1px solid var(--blue-200);padding:14px 18px calc(16px + env(safe-area-inset-bottom));display:flex;gap:12px;}

  .btn{font:600 15px/1 var(--body);border:none;border-radius:14px;padding:15px 18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:transform .08s,box-shadow .2s,background .2s;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--blue-600);color:#fff;box-shadow:0 6px 16px rgba(28,102,201,.32);flex:1;}
  .btn-primary:disabled{background:var(--blue-200);color:#fff;box-shadow:none;cursor:not-allowed;}
  .btn-ghost{background:var(--white);color:var(--blue-600);box-shadow:var(--shadow-sm);}
  .btn-block{width:100%;}
  .btn-danger{background:#fbeaec;color:var(--danger);box-shadow:none;}

  .home{padding:0 0 26px;}
  .hero{background:linear-gradient(165deg,var(--blue-500),var(--blue-700));color:#fff;padding:30px 24px 34px;border-bottom-left-radius:30px;border-bottom-right-radius:30px;position:relative;overflow:hidden;}
  .hero::after{content:"";position:absolute;right:-50px;top:-60px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.10);}
  .hero::before{content:"";position:absolute;right:30px;bottom:-70px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.07);}
  .hero .badge{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);padding:6px 12px;border-radius:99px;font:600 11px/1 var(--body);letter-spacing:.05em;}
  .hero h1{font:600 27px/1.12 var(--disp);letter-spacing:.01em;margin:16px 0 8px;position:relative;}
  .hero p{font:400 13px/1.5 var(--body);color:rgba(255,255,255,.9);max-width:30ch;position:relative;}

  .home-inner{padding:22px 20px 0;}
  .count-chip{display:flex;align-items:center;gap:12px;background:var(--blue-50);border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin-bottom:14px;}
  .count-chip .n{font:700 26px/1 var(--disp);color:var(--blue-600);}
  .count-chip .lbl{font:500 12px/1.3 var(--body);color:var(--muted);}

  .conn{display:flex;align-items:center;gap:9px;border:1px dashed var(--blue-200);background:var(--white);border-radius:14px;padding:12px 14px;margin-bottom:22px;cursor:pointer;font:500 12.5px/1.2 var(--body);color:var(--muted);}
  .conn .d{width:9px;height:9px;border-radius:50%;background:var(--danger);flex:0 0 auto;}
  .conn.ok{border-style:solid;border-color:var(--success-bg);}
  .conn.ok .d{background:var(--success);}
  .conn .edit{margin-left:auto;font:600 12px var(--body);color:var(--blue-600);}

  .section-eyebrow{font:600 11px/1 var(--body);letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin:0 0 12px 2px;}
  .action-card{display:flex;align-items:center;gap:16px;width:100%;text-align:left;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:14px;cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .2s,border-color .2s;}
  .action-card:active{transform:scale(.98);}
  .action-card:hover{box-shadow:var(--shadow-md);border-color:var(--blue-200);}
  .action-card .ic{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;flex:0 0 auto;}
  .action-card .ic.blue{background:var(--blue-100);color:var(--blue-600);}
  .action-card .ic.teal{background:var(--success-bg);color:var(--success);}
  .action-card .ic.amber{background:#fff4d6;color:#b8860b;}
  .donut-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:20px;background:var(--white);border:1px solid var(--line);border-radius:18px;padding:18px 8px;box-shadow:var(--shadow-sm);}
  .donut{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .donut svg{display:block;}
  .donut .dv{font:700 15px var(--disp);fill:var(--ink);}
  .donut .dl{font:600 10.5px/1.25 var(--body);color:var(--ink);text-align:center;}
  .rec-detail{padding:20px 18px 30px;}
  .rec-detail .rd-head{background:linear-gradient(165deg,var(--blue-500),var(--blue-700));color:#fff;border-radius:16px;padding:18px;margin-bottom:16px;}
  .rec-detail .rd-head .id{font:700 22px var(--disp);letter-spacing:.05em;}
  .rec-detail .rd-head .meta{font:400 12px var(--body);opacity:.9;margin-top:4px;}
  .rd-sec{font:600 11px var(--body);letter-spacing:.12em;text-transform:uppercase;color:var(--blue-600);margin:18px 2px 8px;}
  .rd-item{display:flex;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line);}
  .rd-item .q{font:400 12.5px/1.35 var(--body);color:var(--muted);flex:1;}
  .rd-item .a{font:600 13px/1.35 var(--body);color:var(--ink);text-align:right;flex:0 0 46%;}
  .action-card .tx{flex:1;min-width:0;}
  .action-card .tx h3{font:600 17px/1.1 var(--disp);letter-spacing:.01em;margin-bottom:4px;}
  .action-card .tx span{font:400 12.5px/1.4 var(--body);color:var(--muted);}
  .action-card .arrow{color:var(--blue-300);flex:0 0 auto;}

  .q-wrap{padding:26px 22px 22px;animation:slideIn .32s cubic-bezier(.2,.7,.2,1);}
  @keyframes slideIn{from{opacity:0;transform:translateX(22px);}to{opacity:1;transform:translateX(0);}}
  .q-eyebrow{display:inline-block;font:600 10.5px/1 var(--body);letter-spacing:.14em;text-transform:uppercase;color:var(--blue-600);background:var(--blue-50);border:1px solid var(--line);padding:6px 11px;border-radius:99px;margin-bottom:16px;}
  .q-text{font:500 22px/1.28 var(--disp);letter-spacing:.005em;color:var(--ink);margin-bottom:6px;}
  .q-help{font:400 13px/1.5 var(--body);color:var(--muted);margin-bottom:22px;}

  .opts{display:flex;flex-direction:column;gap:11px;}
  .opt{display:flex;align-items:center;gap:13px;padding:16px;border:1.5px solid var(--line);border-radius:14px;background:var(--white);cursor:pointer;transition:border-color .15s,background .15s,box-shadow .15s;font:500 15px/1.3 var(--body);color:var(--ink);}
  .opt:hover{border-color:var(--blue-300);}
  .opt .mark{width:22px;height:22px;border-radius:50%;border:2px solid var(--blue-200);flex:0 0 auto;display:grid;place-items:center;transition:border-color .15s;}
  .opt .mark::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--blue-600);transform:scale(0);transition:transform .15s;}
  .opt.sel{border-color:var(--blue-500);background:var(--blue-50);box-shadow:0 0 0 3px rgba(47,125,225,.12);}
  .opt.sel .mark{border-color:var(--blue-600);}
  .opt.sel .mark::after{transform:scale(1);}
  .opt.likert.sel.agree{border-color:var(--success);background:var(--success-bg);box-shadow:0 0 0 3px rgba(31,157,107,.12);}
  .opt.likert.sel.agree .mark{border-color:var(--success);}.opt.likert.sel.agree .mark::after{background:var(--success);}
  .opt.likert.sel.disagree{border-color:var(--danger);background:#fbeaec;box-shadow:0 0 0 3px rgba(209,73,91,.12);}
  .opt.likert.sel.disagree .mark{border-color:var(--danger);}.opt.likert.sel.disagree .mark::after{background:var(--danger);}

  .field input{width:100%;font:500 17px/1.2 var(--body);color:var(--ink);padding:15px 16px;border:1.5px solid var(--line);border-radius:14px;background:var(--white);outline:none;transition:border-color .15s,box-shadow .15s;}
  .field input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(47,125,225,.14);}
  .field input[readonly]{background:var(--blue-50);font-family:var(--disp);letter-spacing:.06em;color:var(--blue-700);font-size:20px;}
  .other-box{margin-top:11px;animation:slideIn .25s ease;}
  .other-box input{width:100%;font:500 15px/1.2 var(--body);padding:13px 15px;border:1.5px solid var(--blue-300);border-radius:12px;outline:none;}
  .other-box input:focus{border-color:var(--blue-500);box-shadow:0 0 0 3px rgba(47,125,225,.14);}

  .done{padding:60px 26px;text-align:center;display:flex;flex-direction:column;align-items:center;}
  .done .circle{width:96px;height:96px;border-radius:50%;display:grid;place-items:center;margin-bottom:24px;animation:pop .5s cubic-bezier(.2,.8,.2,1);}
  .done .circle.ok{background:var(--success-bg);color:var(--success);}
  .done .circle.end{background:var(--blue-50);color:var(--blue-500);}
  @keyframes pop{0%{transform:scale(.4);opacity:0;}60%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
  .done h2{font:600 24px/1.2 var(--disp);margin-bottom:10px;}
  .done p{font:400 14px/1.55 var(--body);color:var(--muted);max-width:28ch;margin-bottom:14px;}
  .done .sync{font:600 12px var(--body);padding:6px 12px;border-radius:99px;margin-bottom:24px;}
  .done .sync.on{background:var(--success-bg);color:var(--success);}
  .done .sync.off{background:var(--blue-50);color:var(--blue-600);}
  .done .actions{width:100%;display:flex;flex-direction:column;gap:12px;}

  .dash{padding:20px 18px 30px;}
  .dash-head{display:flex;align-items:center;margin-bottom:2px;}
  .dash h2{font:600 21px/1 var(--disp);}
  .dash .sub{font:400 12.5px/1.4 var(--body);color:var(--muted);margin-bottom:14px;}
  .src{display:inline-flex;align-items:center;gap:6px;font:600 11px var(--body);padding:5px 10px;border-radius:99px;margin-bottom:14px;}
  .src.live{background:var(--success-bg);color:var(--success);}
  .src.device{background:var(--blue-50);color:var(--blue-600);}
  .src .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
  .refresh-btn{margin-left:auto;width:34px;height:34px;border:none;border-radius:10px;background:var(--white);color:var(--blue-600);box-shadow:var(--shadow-sm);display:grid;place-items:center;cursor:pointer;}
  .refresh-btn:active{transform:rotate(90deg);}

  .seg{display:flex;background:var(--blue-50);border:1px solid var(--line);border-radius:12px;padding:4px;gap:4px;margin-bottom:16px;}
  .seg button{flex:1;border:none;background:transparent;font:600 12px var(--body);color:var(--muted);padding:9px 6px;border-radius:9px;cursor:pointer;transition:.15s;}
  .seg button.on{background:var(--white);color:var(--blue-700);box-shadow:var(--shadow-sm);}

  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
  .stat{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--shadow-sm);}
  .stat .n{font:700 27px/1 var(--disp);color:var(--blue-600);}
  .stat .n.green{color:var(--success);}
  .stat .l{font:500 11.5px/1.3 var(--body);color:var(--muted);margin-top:6px;}

  .card{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:16px 16px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
  .card h4{font:600 13px/1 var(--body);letter-spacing:.02em;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .card h4 .dot{width:8px;height:8px;border-radius:50%;background:var(--blue-500);}
  .bar-row{margin-bottom:11px;}.bar-row:last-child{margin-bottom:0;}
  .bar-top{display:flex;justify-content:space-between;margin-bottom:5px;}
  .bar-top .k{font:500 12px/1.2 var(--body);color:var(--ink);}
  .bar-top .v{font:600 12px/1.2 var(--body);color:var(--muted);}
  .bar-track{height:9px;background:var(--blue-50);border-radius:99px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue-400),var(--blue-600));transition:width .6s cubic-bezier(.2,.7,.2,1);}
  .bar-fill.green{background:linear-gradient(90deg,#3fbe8b,var(--success));}
  .dash-sec{font:600 11px var(--body);letter-spacing:.12em;text-transform:uppercase;color:var(--blue-600);margin:22px 2px 12px;padding-top:14px;border-top:1px solid var(--line);}
  .dash-sec:first-of-type{border-top:none;padding-top:2px;margin-top:8px;}
  .num-grid{display:flex;gap:20px;}
  .num-grid>div{display:flex;flex-direction:column;gap:3px;}
  .num-grid .nn{font:700 21px/1 var(--disp);color:var(--blue-600);}
  .num-grid .nl{font:500 11px var(--body);color:var(--muted);}
  .other-list{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px;}
  .other-list .oh{font:600 11px var(--body);color:var(--muted);margin-bottom:6px;letter-spacing:.02em;}
  .other-list .oi{font:400 12.5px/1.4 var(--body);color:var(--ink);padding:2px 0;}
  .other-list .om{font:400 11px var(--body);color:var(--muted);margin-top:4px;}

  .list-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .list-item:last-child{border-bottom:none;}
  .list-item .av{width:38px;height:38px;border-radius:11px;background:var(--blue-50);color:var(--blue-600);display:grid;place-items:center;font:600 12px var(--disp);flex:0 0 auto;letter-spacing:.03em;}
  .list-item .meta{flex:1;min-width:0;}
  .list-item .meta .t{font:600 13.5px/1.2 var(--body);color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .list-item .meta .s{font:400 11.5px/1.3 var(--body);color:var(--muted);margin-top:2px;}
  .pill{font:600 10.5px/1 var(--body);padding:5px 9px;border-radius:99px;flex:0 0 auto;}
  .pill.yes{background:var(--success-bg);color:var(--success);}
  .pill.no{background:#fbeaec;color:var(--danger);}

  .empty{text-align:center;padding:44px 20px;}
  .empty .ic{width:76px;height:76px;margin:0 auto 18px;border-radius:22px;background:var(--blue-50);color:var(--blue-300);display:grid;place-items:center;}
  .empty h3{font:600 18px/1.2 var(--disp);margin-bottom:8px;}
  .empty p{font:400 13px/1.5 var(--body);color:var(--muted);max-width:26ch;margin:0 auto 22px;}
  .spin{width:34px;height:34px;border:3px solid var(--blue-100);border-top-color:var(--blue-500);border-radius:50%;animation:sp 0.8s linear infinite;margin:0 auto;}
  @keyframes sp{to{transform:rotate(360deg);}}

  .dash-tools{display:flex;gap:10px;margin-top:6px;}
  .dash-tools .btn{flex:1;font-size:13px;padding:13px 10px;}
  .toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font:500 13px var(--body);padding:11px 18px;border-radius:12px;box-shadow:var(--shadow-md);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:50;white-space:nowrap;max-width:88%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

    <div id="app"></div>

<script>
/* =========================================================
   CONFIG — paste your Google Apps Script Web App URL here,
   or tap "Connect Google Sheet" on the home screen.
   ========================================================= */
let GAS_URL = "https://script.google.com/macros/s/AKfycbweUlnek3AAc0rflT1M7HKn8W0eLkiyqiBDEuDRojO5mZizIUySUC5Xm-u0p6ZBGTqt/exec";

/* ---------- storage (localStorage w/ in-memory fallback) ---------- */
const Store = (() => {
  let ok=false, mem={};
  try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok=true; }catch(e){}
  return {
    get(k,d){ if(ok){ try{ const v=localStorage.getItem(k); return v==null?d:JSON.parse(v);}catch(e){return d;} } return k in mem?mem[k]:d; },
    set(k,v){ if(ok){ try{ localStorage.setItem(k,JSON.stringify(v)); return; }catch(e){} } mem[k]=v; }
  };
})();
const REC_KEY='iptp_records_v1', URL_KEY='iptp_gas_url_v1';
let records = Store.get(REC_KEY,[]);
GAS_URL = Store.get(URL_KEY, GAS_URL) || GAS_URL;

/* =========================================================
   Questionnaire (facility asked before the auto ID)
   ========================================================= */
const SEC={consent:'Consent',id:'Identification',a:'A · Socio-demographic',b:'B · Obstetric & ANC history',c:'C · Knowledge of IPTp-SP',d:'D · Perceptions & health system',e:'E · IPTp-SP uptake',v:'Verification (ANC card)'};
const LIKERT=[{value:'Agree',cls:'agree'},{value:'Not Sure',cls:''},{value:'Disagree',cls:'disagree'}];
const FACILITIES=['Princess Christian Maternity Hospital (PCMH)','Rogbanba PHU'];

const Q=[
  {id:'consent',s:SEC.consent,type:'choice',q:'Do you voluntarily agree to participate in this study?',help:'Participation is voluntary and confidential. The interview takes about 10–12 minutes.',options:['Yes','No']},

  {id:'facility',s:SEC.id,type:'choice',q:'Health facility',options:FACILITIES},
  {id:'qid',s:SEC.id,type:'auto',q:'Questionnaire ID',help:'Generated automatically from the facility and the interview count on this device.'},
  {id:'residence',s:SEC.id,type:'choice',q:'Residence',options:['Urban','Rural']},
  {id:'date',s:SEC.id,type:'date',q:'Interview date'},

  {id:'A1',s:SEC.a,type:'choice',q:'Age',options:['Less than 20 years','20–24 years','25–29 years','30–34 years','35 years and above']},
  {id:'A2',s:SEC.a,type:'choice',q:'Marital status',options:['Single','Married','Cohabiting','Divorced/Separated','Widowed']},
  {id:'A3',s:SEC.a,type:'choice',q:'Highest educational level completed',options:['No formal education','Primary','Junior Secondary','Senior Secondary','Tertiary']},
  {id:'A4',s:SEC.a,type:'choice',q:'Occupation',options:['Unemployed','Trader','Farmer','Civil Servant','Student','Other'],other:'Other'},
  {id:'A5',s:SEC.a,type:'choice',q:'Who usually decides when you should attend ANC?',options:['Self','Husband/Partner','Joint decision','Family member','Other'],other:'Other'},

  {id:'B1',s:SEC.b,type:'choice',q:'Is this your first pregnancy?',options:['Yes','No']},

const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayISO=()=>new Date().toISOString().slice(0,10);
function facNum(f){ return f===FACILITIES[1]?2:1; }
function genId(f){
  const n=facNum(f);
  const seq=records.filter(r=>facNum(r.facility)===n).length+1;
  return 'phu'+n+'_'+String(seq).padStart(2,'0');
}
function visibleList(){ return Q.filter(q=>!q.when||q.when(ans)); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2100); }
function isAnswered(q){
  if(q.optional||q.type==='auto') return true;
  const v=ans[q.id];
  if(v===undefined||v===''||v===null) return false;
  if(q.other&&v===q.other&&!(ans[q.id+'_other']||'').trim()) return false;
  return true;
}

/* =========================================================
   SURVEY (one question per page)
   ========================================================= */
function startSurvey(){ ans={date:todayISO()}; idx=0; ended=false; renderQuestion(); }

function renderQuestion(){
  const vis=visibleList();
  while(idx<Q.length && Q[idx].when && !Q[idx].when(ans)) idx++;
  if(idx>=Q.length){ finish(); return; }
  const q=Q[idx];
  const pos=vis.indexOf(q)+1, total=vis.length, pct=Math.round((pos-1)/total*100);

  let control='';
  if(q.type==='choice'||q.type==='likert'){
    const opts=q.type==='likert'?LIKERT.map(o=>o.value):q.options;
    control='<div class="opts">'+opts.map(opt=>{
      const sel=ans[q.id]===opt, lk=q.type==='likert';
      const cls=lk?LIKERT.find(o=>o.value===opt).cls:'';
      return `<div class="opt ${lk?'likert':''} ${cls} ${sel?'sel':''}" onclick="pick('${esc(opt).replace(/'/g,"\\'")}',${lk})"><span class="mark"></span><span>${esc(opt)}</span></div>`;
    }).join('')+'</div>';
    if(q.other){
      const show=ans[q.id]===q.other;
      control+=`<div id="otherBox" style="${show?'':'display:none'}"><div class="other-box"><input type="text" placeholder="Please specify…" value="${esc(ans[q.id+'_other']||'')}" oninput="ans['${q.id}_other']=this.value;refreshNext();"></div></div>`;
    }
  } else if(q.type==='auto'){
    const val=genId(ans.facility); ans.qid=val;
    control=`<div class="field"><input type="text" value="${esc(val)}" readonly></div>`;
  } else {
    const t=q.type==='number'?'number':q.type==='date'?'date':'text';
    control=`<div class="field"><input type="${t}" ${q.ph?`placeholder="${esc(q.ph)}"`:''} value="${esc(ans[q.id]||'')}" oninput="ans['${q.id}']=this.value;refreshNext();"></div>`;
  }

  const last=pos===total;
  app.innerHTML=`
    <div class="appbar">
      <button class="ico-btn" onclick="prevQ()">${idx===0?I.home:I.back}</button>
      <div class="titles"><div class="eyebrow">${esc(q.s)}</div><div class="title">IPTp-SP Interview</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-row"><span class="step">Question ${pos} of ${total}</span><span class="pct">${pct}%</span></div>
      <div class="track"><div class="fill" style="width:${pct}%"></div></div>
    </div>
    <div class="body"><div class="q-wrap" id="qwrap">
      <span class="q-eyebrow">${esc(q.id)}</span>
      <div class="q-text">${esc(q.q)}</div>
      ${q.help?`<div class="q-help">${esc(q.help)}</div>`:''}
      ${control}
    </div></div>
    <div class="footer"><button class="btn btn-primary" id="nextBtn" onclick="nextQ()">${last?'Review &amp; submit':'Next'}</button></div>`;
  refreshNext();
}
function pick(val,lk){
  const q=Q[idx]; ans[q.id]=val;
  if(q.other){ const b=document.getElementById('otherBox'); if(b) b.style.display=(val===q.other)?'':'none'; }
  document.querySelectorAll('#qwrap .opt').forEach(el=>el.classList.remove('sel'));
  event.currentTarget.classList.add('sel'); refreshNext();
}
function refreshNext(){ const b=document.getElementById('nextBtn'); if(b) b.disabled=!isAnswered(Q[idx]); }
function nextQ(){
  const q=Q[idx];
  if(!isAnswered(q)){ toast('Please answer to continue'); return; }
  if(q.id==='consent'&&ans.consent==='No'){ ended=true; finish(); return; }
  idx++; while(idx<Q.length&&Q[idx].when&&!Q[idx].when(ans)) idx++;
  if(idx>=Q.length) finish(); else renderQuestion();
}
function prevQ(){
  if(idx===0){ renderHome(); return; }
  idx--; while(idx>0&&Q[idx].when&&!Q[idx].when(ans)) idx--;
  renderQuestion();
}

function finish(){
  const rec=Object.assign({},ans,{_id:ans.qid||('REC-'+(records.length+1)),_ts:new Date().toISOString(),_consent:ans.consent||(ended?'No':'')});
  records.push(rec); Store.set(REC_KEY,records);
  submitToSheet(rec);
  renderDone(ended);
}
function submitToSheet(rec){
  if(!GAS_URL) return;
  try{
    fetch(GAS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(rec)});
  }catch(e){}
}
function renderDone(declined){
  const synced=!!GAS_URL;
  app.innerHTML=`<div class="body"><div class="done">
    <div class="circle ${declined?'end':'ok'}">${declined?I.door:I.check}</div>
    <h2>${declined?'Interview ended':'Interview saved'}</h2>
    <p>${declined?'The participant declined to take part. Thank you for recording this.':'This response has been recorded'+(synced?' and sent to Google Sheets.':' on this device.')}</p>

}

let dashFilter2='all';
function openDash(){
  dashFilter2='all';
  if(!GAS_URL){ dashSource='none'; drawDash(); return; }
  dashLoading=true; drawDash();
  fetchLive(rows=>{
    dashLoading=false;
    if(rows&&Array.isArray(rows)){ dashData=rows; dashSource='live'; }
    else { dashSource='error'; }
    drawDash();
  });
}
function fetchLive(cb){
  const fn='__cb'+Date.now();
  const s=document.createElement('script'); let done=false;
  window[fn]=data=>{ done=true; delete window[fn]; s.remove(); cb(data); };
  s.onerror=()=>{ if(done)return; delete window[fn]; s.remove(); cb(null); };
  s.src=GAS_URL+(GAS_URL.indexOf('?')>-1?'&':'?')+'callback='+fn+'&t='+Date.now();
  document.body.appendChild(s);
  setTimeout(()=>{ if(!done){ try{delete window[fn]; s.remove();}catch(e){} cb(null);} },12000);
}
function refreshDash(){ openDash(); }
function setFilter(f){ dashFilter2=f; drawDash(); }
function dashFiltered(){
  if(dashFilter2==='all') return dashData;
  const want=dashFilter2==='f1'?FACILITIES[0]:FACILITIES[1];
  return dashData.filter(r=>r.facility===want);
}

/* ---------- shared analytics ---------- */
function dist(data,field,order){
  const c={}; data.forEach(r=>{const v=r[field]; if(v!==''&&v!=null) c[v]=(c[v]||0)+1;});
  let keys=order?order.filter(k=>c[k]):Object.keys(c).sort((a,b)=>c[b]-c[a]);
  const total=keys.reduce((s,k)=>s+c[k],0)||1;
  return keys.map(k=>({k,n:c[k],pct:Math.round(c[k]/total*100)}));
}
function pctYes(data,field){
  const rel=data.filter(r=>r[field]==='Yes'||r[field]==='No');
  if(!rel.length) return null;
  return Math.round(rel.filter(r=>r[field]==='Yes').length/rel.length*100);
}
function donut(pct,color,label){
  const r=32,c=2*Math.PI*r,off=c*(1-(pct||0)/100);
  return `<div class="donut"><svg viewBox="0 0 80 80" width="78" height="78">
      <circle cx="40" cy="40" r="${r}" fill="none" stroke="var(--blue-50)" stroke-width="9"/>
      <circle cx="40" cy="40" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 40 40)"/>
      <text x="40" y="40" text-anchor="middle" dominant-baseline="central" class="dv">${pct==null?'—':pct+'%'}</text>
    </svg><div class="dl">${label}</div></div>`;
}
function barBlock(title,rows,green,extra){
  if(!rows.length&&!extra) return `<div class="card"><h4><span class="dot"></span>${esc(title)}</h4><div style="font:400 12.5px var(--body);color:var(--muted)">No responses yet.</div></div>`;
  return `<div class="card"><h4><span class="dot"></span>${esc(title)}</h4>`+rows.map(r=>`<div class="bar-row"><div class="bar-top"><span class="k">${esc(r.k)}</span><span class="v">${r.n} · ${r.pct}%</span></div><div class="bar-track"><div class="bar-fill ${green?'green':''}" style="width:${r.pct}%"></div></div></div>`).join('')+(extra||'')+`</div>`;
}
function numSummary(data,id){
  const vals=data.map(r=>parseFloat(r[id])).filter(v=>!isNaN(v));
  if(!vals.length) return null;
  const sum=vals.reduce((a,b)=>a+b,0);
  return {n:vals.length,mean:sum/vals.length,min:Math.min.apply(null,vals),max:Math.max.apply(null,vals)};
}
function otherList(data,id){
  const t=data.map(r=>r[id+'_other']).filter(x=>x&&String(x).trim());
  if(!t.length) return '';
  return `<div class="other-list"><div class="oh">“Other” specified (${t.length})</div>`+
    t.slice(0,8).map(x=>`<div class="oi">• ${esc(x)}</div>`).join('')+
    (t.length>8?`<div class="om">+${t.length-8} more</div>`:'')+`</div>`;
}
function allQuestionBlocks(data){
  let html='',cur='';
  Q.forEach(q=>{
    if(q.type==='auto'||q.type==='date'||q.type==='text') return;
    if(q.s!==cur){ cur=q.s; html+=`<div class="dash-sec">${esc(cur)}</div>`; }
    if(q.type==='choice'||q.type==='likert'){
      const order=q.type==='likert'?LIKERT.map(o=>o.value):q.options;
      html+=barBlock(q.id+'. '+q.q, dist(data,q.id,order), false, q.other?otherList(data,q.id):'');
    } else if(q.type==='number'){
      const s=numSummary(data,q.id);
      html+=`<div class="card"><h4><span class="dot"></span>${esc(q.id+'. '+q.q)}</h4>`+
        (s?`<div class="num-grid"><div><span class="nn">${s.mean.toFixed(1)}</span><span class="nl">mean</span></div><div><span class="nn">${s.min}–${s.max}</span><span class="nl">range</span></div><div><span class="nn">${s.n}</span><span class="nl">responses</span></div></div>`
           :`<div style="font:400 12.5px var(--body);color:var(--muted)">No responses yet.</div>`)+`</div>`;
    }
  });
  return html;
}

function drawDash(){
  const header=`<div class="appbar">
      <button class="ico-btn" onclick="renderHome()">${I.home}</button>
      <div class="titles"><div class="eyebrow">Live · Google Sheets</div><div class="title">Dashboard</div></div>
      <button class="refresh-btn" onclick="refreshDash()" title="Refresh">${I.refresh}</button>
    </div>`;

  if(dashSource==='none'){
    app.innerHTML=header+`<div class="body"><div class="dash"><div class="empty">
      <div class="ic">${I.cloud}</div><h3>Not connected</h3>
      <p>Connect a Google Sheet to see live charts from all submitted responses.</p>
      <button class="btn btn-primary btn-block" onclick="setGAS()">Connect Google Sheet</button>
    </div></div></div>`;
    return;
  }
  if(dashLoading){
    app.innerHTML=header+`<div class="body"><div class="dash"><div class="empty"><div class="spin"></div><h3 style="margin-top:20px">Loading live data…</h3><p>Fetching responses from Google Sheets.</p></div></div></div>`;
    return;
  }
  if(dashSource==='error'){
    app.innerHTML=header+`<div class="body"><div class="dash"><div class="empty">
      <div class="ic">${I.cloud}</div><h3>Couldn’t reach the sheet</h3>
      <p>Check that the Apps Script is deployed with access set to “Anyone”, then retry.</p>
      <button class="btn btn-primary btn-block" onclick="openDash()">Retry</button>
      <div style="height:12px"></div><button class="btn btn-ghost btn-block" onclick="openRecords()">View device records instead</button>
    </div></div></div>`;
    return;
  }
  if(!dashData.length){
    app.innerHTML=header+`<div class="body"><div class="dash"><div class="empty">
      <div class="ic">${I.empty}</div><h3>No responses yet</h3>
      <p>Once interviews are submitted they’ll appear here live.</p>
      <button class="btn btn-primary btn-block" onclick="startSurvey()">Collect data</button>
    </div></div></div>`;
    return;
  }

  const data=dashFiltered(), n=data.length;
  const consented=data.filter(r=>r._consent==='Yes'||r.consent==='Yes').length;
  const consentRate=n?Math.round(consented/n*100):0;
  const uptake=pctYes(data,'E1'), dot=pctYes(data,'E2');
  const recent=data.slice().reverse().slice(0,6);

  app.innerHTML=header+`<div class="body"><div class="dash">
    <div class="dash-head"><h2>Live dashboard</h2></div>
    <div class="sub">${n} response${n===1?'':'s'} in Google Sheets${dashFilter2==='all'?'':' (filtered)'}</div>
    <span class="src live"><span class="d"></span>Live · Google Sheets</span>

    <div class="seg">
      <button class="${dashFilter2==='all'?'on':''}" onclick="setFilter('all')">All</button>
      <button class="${dashFilter2==='f1'?'on':''}" onclick="setFilter('f1')">PCMH (phu1)</button>
      <button class="${dashFilter2==='f2'?'on':''}" onclick="setFilter('f2')">Rogbanba (phu2)</button>
    </div>

    <div class="donut-row">
      ${donut(consentRate,'var(--blue-500)','Consent rate')}
      ${donut(uptake,'var(--success)','Received IPTp-SP')}
      ${donut(dot,'var(--blue-400)','Directly observed')}
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="n">${n}</div><div class="l">Total responses</div></div>
      <div class="stat"><div class="n">${data.filter(r=>facNum(r.facility)===1).length} / ${data.filter(r=>facNum(r.facility)===2).length}</div><div class="l">PCMH / Rogbanba</div></div>
    </div>

    <div class="dash-sec" style="border-top:none;padding-top:6px;margin-top:6px;color:var(--muted)">Response breakdown · every question</div>
    ${allQuestionBlocks(data)}

    <div class="card"><h4><span class="dot"></span>Recent submissions</h4>
      ${recent.map(r=>{const up=r.E1;return `<div class="list-item">
        <div class="av">${esc(String(r._id||r.qid||'?'))}</div>
        <div class="meta"><div class="t">${esc(r.facility||'—')}</div><div class="s">${esc(r.date||String(r._ts||'').slice(0,10))}</div></div>
        ${up?`<span class="pill ${up==='Yes'?'yes':'no'}">IPTp ${esc(up)}</span>`:`<span class="pill no">Declined</span>`}
      </div>`;}).join('')}
    </div>

    <div class="dash-tools">
      <button class="btn btn-ghost btn-block" onclick="exportData(dashFiltered(),'iptp_dashboard.csv')">Export CSV</button>
    </div>
  </div></div>`;
}

/* ---------- data tools ---------- */
function exportData(data,name){
  if(!data||!data.length){ toast('No data to export'); return; }
  const base=['_id','_ts','_consent'].concat(Q.map(q=>q.id)).concat(Q.filter(q=>q.other).map(q=>q.id+'_other'));
  const extra=[]; data.forEach(r=>Object.keys(r).forEach(k=>{if(base.indexOf(k)===-1&&extra.indexOf(k)===-1)extra.push(k);}));
  const cols=base.concat(extra);
  const cell=v=>{v=v==null?'':String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv=[cols.join(',')].concat(data.map(r=>cols.map(c=>cell(r[c])).join(','))).join('\n');
  const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download=name||'data.csv';
  document.body.appendChild(a); a.click(); a.remove(); toast('CSV exported');
}
function clearAll(){ if(!confirm('Delete all interviews stored on this phone?'))return; records=[]; Store.set(REC_KEY,records); renderRecords(); }

function seed(){
  const pk=a=>a[Math.floor(Math.random()*a.length)], w=(a,p)=>Math.random()<p?a[0]:a[1];
  for(let i=0;i<12;i++){
    const fac=pk(FACILITIES), e1=w(['Yes','No'],0.68);
    const seq=records.filter(r=>facNum(r.facility)===facNum(fac)).length+1;
    records.push({_id:'phu'+facNum(fac)+'_'+String(seq).padStart(2,'0'),_ts:new Date(Date.now()-i*36e5).toISOString(),_consent:'Yes',consent:'Yes',
      facility:fac,residence:pk(['Urban','Rural']),date:new Date(Date.now()-i*864e5).toISOString().slice(0,10),
      A1:pk(['Less than 20 years','20–24 years','25–29 years','30–34 years','35 years and above']),
      A3:pk(['No formal education','Primary','Junior Secondary','Senior Secondary','Tertiary']),
      B2:w(['First trimester','Second trimester'],0.4),C2:w(['Prevent malaria during pregnancy','Don’t know'],0.7),
      E1:e1,E2:e1==='Yes'?w(['Yes','No'],0.8):'No'});
  }
  Store.set(REC_KEY,records); renderRecords(); toast('Sample data loaded');
}

renderHome();
